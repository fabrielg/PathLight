# ╔══════════════════════════════════════╗
# ║        PathLight Configuration       ║
# ╚══════════════════════════════════════╝

# Particle renderer
particles:
  # Block spacing between each particle along the path (smaller = denser)
  spacing: 0.5

  # Height above ground (in blocks)
  height-offset: 0.1

  # Main trail color (RGB format)
  trail-color: "255,140,0"

  # Player line color → next waypoint
  player-line-color: "255,200,50"

  # Particle size (1.0 = normal)
  size: 1.0

  # Path rendering style
  # LINEAR      → straight lines between each waypoint
  # CATMULL_ROM → smooth curve passing through all waypoints
  trail-style: CATMULL_ROM

  # Catmull-Rom curve tension (0.5 = standard)
  # Recommended values: between 0.3 and 0.7
  catmull-tension: 0.5

  # Number of interpolated points per segment (between two waypoints)
  # Higher = smoother curve but more particles
  # Recommended values: between 8 and 20
  catmull-samples-per-segment: 12

# Navigation
navigation:
  # Trail refresh interval in ticks (20 ticks = 1 second)
  refresh-interval: 10

  # The number of blocks beyond which the player is considered “off-path”
  # and a new path is recalculated
  off-path-threshold: 8.0

# Editor (NavTool)
editor:
  # A block-based radius in which a click detects an existing waypoint
  waypoint-click-radius: 3.0

  # Spacing between particles used to visualize bonds
  edge-particle-spacing: 1.5

  # Display refresh interval in ticks
  visualization-interval: 10

  # Editor colors (RGB format)
  colors:
    waypoint: "255,215,0"           # golden yellow
    waypoint-anchor: "255,0,255"    # purple (anchor waypoint for a rental)
    edge: "255,255,255"             # white
    location-marker: "255,0,255"    # purple above the anchor
    placeholder-new: "160,160,160"  # gray (a new waypoint will be created)
    placeholder-snap: "0,255,0"     # green (snap to existing waypoint)
    snap-indicator: "0,255,0"       # green (magnetic circle)